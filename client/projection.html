<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/style.css" />
  <style>
    .projection-wrap { max-width: 1200px; margin: 0 auto; padding: 40px; }

    .hero-mini {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .hero-mini h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .hero-mini h1 span { color: var(--accent); }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--success);
      font-weight: 600;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .round-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.08); }
    .filter-btn.r1.active { border-color: var(--mentor-color); color: var(--mentor-color); background: rgba(124,92,191,0.08); }
    .filter-btn.r2.active { border-color: var(--warning); color: var(--warning); background: rgba(245,166,35,0.08); }
    .filter-btn.r3.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.08); }

    .evaluators-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .evaluator-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ev-header {
      padding: 18px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ev-avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .ev-name { font-weight: 700; font-size: 15px; }
    .ev-meta { font-size: 12px; color: var(--text-muted); }
    .ev-progress {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .progress-bar { margin-top: 6px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .mentor-fill { background: linear-gradient(90deg, var(--accent2), #a48be8); }
    .judge-fill { background: linear-gradient(90deg, var(--accent), #ff7b8b); }

    .teams-in-ev { padding: 12px 20px; }
    .ev-team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ev-team-row:last-child { border-bottom: none; }
    .ev-team-name { font-weight: 500; }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.done { background: var(--success); box-shadow: 0 0 6px rgba(0,212,170,0.5); }
    .status-dot.pending { background: var(--border); }

    /* Leaderboard */
    .leaderboard-section { margin-top: 48px; }
    .section-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sponsors{
      height: 80px ;
      width: 40%;
      /* background-color: #cd7f32; */
      gap: 10px;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      overflow: none;
    }
    .sponsors img{
      width: 90px;
      object-fit: cover;
    }
    #bs-logo , #tk-logo{
      width: 210px;
      color: #fff;
    }

    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th { padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; }
    .lb-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: rgba(255,255,255,0.02); }
    .rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text-muted); }
    .rank.gold { color: #ffd700; }
    .rank.silver { color: #c0c0c0; }
    .rank.bronze { color: #cd7f32; }
    .total-score-cell { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); }
  </style>
</head>

  <div id="toast-container"></div>
  <script src="js/utils.js"></script>
  <script>
    let currentFilter = 'round1';
    let allUsers = [], allTeams = [];

    function setFilter(round) {
      currentFilter = round;
      document.querySelectorAll('.filter-btn').forEach((b, i) => {
        b.classList.toggle('active', ['round1','round2','round3'][i] === round);
      });
      renderEvaluators();
    }

    async function loadStats() {
      const res = await api('GET', '/users/stats/summary');
      if (!res.success) return;
      const d = res.data;
      document.getElementById('s-total').textContent = d.totalTeams;
      document.getElementById('s-r1').textContent = `${d.scored1}/${d.totalTeams}`;
      document.getElementById('s-r2').textContent = `${d.scored2}/${d.totalTeams}`;
      document.getElementById('s-r3').textContent = `${d.scored3}/${d.totalTeams}`;
    }

    async function loadData() {
      const [usersRes, teamsRes] = await Promise.all([api('GET', '/users'), api('GET', '/teams')]);
      if (usersRes.success) allUsers = usersRes.data;
      if (teamsRes.success) allTeams = teamsRes.data;
      renderEvaluators();
      renderLeaderboard();
      loadStats();
    }

    function renderEvaluators() {
      const grid = document.getElementById('evaluators-grid');
      const isJudge = currentFilter === 'round3';
      const evaluators = allUsers.filter(u => isJudge ? u.role === 'judge' : u.role === 'mentor');

      if (!evaluators.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">👥</div><p>No ${isJudge ? 'judges' : 'mentors'} added yet.</p></div>`;
        return;
      }

      grid.innerHTML = evaluators.map(ev => {
        const teamList = isJudge ? (ev.assignedTeamsRound3 || []) :
                        currentFilter === 'round1' ? (ev.assignedTeamsRound1 || []) : (ev.assignedTeamsRound2 || []);

        const scored = teamList.filter(t => {
          const scores = t.scores?.[currentFilter];
          return scores && scores.submitted;
        }).length;

        const pct = teamList.length ? Math.round((scored / teamList.length) * 100) : 0;
        const fillClass = isJudge ? 'judge-fill' : 'mentor-fill';
        const avatarBg = isJudge ? 'rgba(233,69,96,0.15)' : 'rgba(124,92,191,0.15)';
        const avatarIcon = isJudge ? '⚖️' : '👨‍🏫';

        return `
          <div class="evaluator-card">
            <div class="ev-header">
              <div class="ev-avatar" style="background:${avatarBg}">${avatarIcon}</div>
              <div>
                <div class="ev-name">${ev.name}</div>
                <div class="ev-meta">${ev.organization || ''} · <span class="badge badge-${ev.role}">${ev.role}</span></div>
              </div>
            </div>
            <div class="ev-progress">
              <span>${scored} / ${teamList.length} teams evaluated</span>
              <div class="progress-bar">
                <div class="${fillClass} progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
            <div class="teams-in-ev">
              ${teamList.length === 0
                ? `<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No teams assigned yet</div>`
                : teamList.map(t => {
                    const done = t.scores?.[currentFilter]?.submitted;
                    const score = done ? t.scores[currentFilter].total : null;
                    const max = currentFilter === 'round3' ? 50 : 25;
                    return `
                      <div class="ev-team-row">
                        <span class="ev-team-name">${t.teamName}</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                          ${done ? `<span style="font-size:12px;color:var(--success);font-weight:600;">${score}/${max}</span>` : ''}
                          <div class="status-dot ${done ? 'done' : 'pending'}"></div>
                        </div>
                      </div>
                    `;
                  }).join('')
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard');
      if (!allTeams.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">No data yet.</td></tr>`;
        return;
      }
      const sorted = [...allTeams]
        .map(t => ({ ...t, grand: (t.scores.round1.total || 0) + (t.scores.round2.total || 0) + (t.scores.round3.total || 0) }))
        .sort((a, b) => b.grand - a.grand);

      tbody.innerHTML = sorted.map((t, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
        const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        return `<tr>
          <td><span class="rank ${rankClass}">${rankEmoji}</span></td>
          <td><strong>${t.teamName}</strong></td>
          <td>${t.leaderName || '—'}</td>
          <td style="color:var(--mentor-color)">${t.scores.round1.submitted ? t.scores.round1.total : '—'}</td>
          <td style="color:var(--warning)">${t.scores.round2.submitted ? t.scores.round2.total : '—'}</td>
          <td style="color:var(--accent)">${t.scores.round3.submitted ? t.scores.round3.total : '—'}</td>
          <td><span class="total-score-cell">${t.grand > 0 ? t.grand : '—'}</span></td>
        </tr>`;
      }).join('');
    }

    // Initial load
    loadData();
    // Auto-refresh every 15 seconds
    setInterval(loadData, 15000);
  </script>
